name = "agentplane"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Account ID - set via environment or wrangler login
# account_id = ""

[vars]
# Set via wrangler secret or .dev.vars
# CF_TEAM_DOMAIN = ""
# CF_POLICY_AUD = ""
# CF_ACCOUNT_ID = ""
# AI_GATEWAY_ID = ""

# KV Namespaces - created by setup script
[[kv_namespaces]]
binding = "TENANT_KV"
id = ""  # Populated by setup script

[[kv_namespaces]]
binding = "TENANT_TOKENS"
id = ""  # Populated by setup script

[[kv_namespaces]]
binding = "SECRETS_KV"
id = ""  # Populated by setup script

# R2 Bucket - created by setup script
[[r2_buckets]]
binding = "PLUGIN_CACHE"
bucket_name = "agentplane-plugins"

[[r2_buckets]]
binding = "TENANT_STORAGE"
bucket_name = "agentplane-tenants"

# Durable Objects for Sandbox (if using DO-based sandbox)
# [[durable_objects.bindings]]
# name = "Sandbox"
# class_name = "SandboxDO"

# Sandbox SDK binding - requires Cloudflare Sandbox SDK access
# [unsafe.bindings]
# name = "Sandbox"
# type = "sandbox"

[build]
command = "npm run build"

[dev]
port = 8787
local_protocol = "http"

# Environment-specific overrides
[env.staging]
name = "agentplane-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "agentplane-production"
vars = { ENVIRONMENT = "production" }
