# Example Tenant Configuration
# Copy this file and modify for your tenant

tenant:
  id: example-tenant
  name: Example Organization

# Zero Trust service tokens for M2M authentication
zero_trust:
  service_tokens:
    - client_id: ${SERVICE_TOKEN_CLIENT_ID}
      name: Production API
      permissions:
        - agent:run
        - agent:session:read

# Resource limits
resources:
  sandbox:
    sleep_after: 5m
    max_concurrent_sessions: 5
  storage:
    bucket_prefix: example-tenant
    quota_gb: 10

# Plugin sources from GitHub repositories
plugins:
  - repo: your-org/claude-plugins
    path: plugins/common
    ref: main
    # Optional: for private repos
    # github_token: ${GITHUB_TOKEN}
    env:
      API_KEY: ${PLUGIN_API_KEY}

# MCP server domain allowlist
# Only servers with URLs matching these domains will be allowed
allowed_mcp_domains:
  - "*.example.com"
  - api.openai.com
  - mcp.anthropic.com

# AI provider configuration
ai:
  provider: anthropic
  # For AWS Bedrock:
  # provider: bedrock
  # bedrock_region: us-east-1
  # bedrock_model: anthropic.claude-3-sonnet-20240229-v1:0

# Rate limiting
rate_limits:
  requests_per_minute: 60
  tokens_per_day: 1000000
